openapi: 3.0.0
info:
  title: Кулинарный блог API
  description: API для кулинарного блога-форума с рецептами
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Локальный сервер разработки

paths:

  # ==================== РЕЦЕПТЫ ====================
  /recipes:
    get:
      summary: Получить список рецептов
      responses:
        '200':
          description: Успешно

    post:
      summary: Создать новый рецепт
      responses:
        '201':
          description: Рецепт успешно создан
        '400':
          description: Ошибка в данных
        '401':
          description: Не авторизован

  /recipes/{id}:
    get:
      summary: Получить один рецепт по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID рецепта
      responses:
        '200':
          description: Рецепт успешно найден
        '404':
          description: Рецепт не найден

  # ==================== КОММЕНТАРИИ ====================
  /recipes/{recipeId}/comments:
    get:
      summary: Получить комментарии к рецепту
      responses:
        '200':
          description: Комментарии получены

    post:
      summary: Добавить комментарий
      responses:
        '201':
          description: Комментарий добавлен
        '401':
          description: Не авторизован

  # ==================== АВТОРИЗАЦИЯ ====================
  /auth/register:
    post:
      summary: Регистрация пользователя
      responses:
        '201':
          description: Пользователь создан
        '400':
          description: Ошибка в данных

  /auth/login:
    post:
      summary: Вход пользователя
      responses:
        '200':
          description: Успешный вход
        '401':
          description: Неверные данные

components:
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
